name: 'heatcheck-action'
description: 'Catch the injection bugs LLMs ship past green tests — static taint analysis for Python and Go.'
author: 'Nels Chantarotwong'
branding:
  icon: 'shield'
  color: 'orange'

inputs:
  paths:
    description: |
      Space-separated paths to scan (files or directories). Default: . (the workspace root).
      Note: paths cannot contain spaces — for multi-path scans use space-separated tokens
      ("src tests/"). Heatcheck skips dotdirs (.git, .venv, .mypy_cache, ...) and __pycache__
      automatically.
    required: false
    default: '.'
  fail-on-violations:
    description: 'Fail the workflow when any violation is found. Must be "true" or "false". Default: "true".'
    required: false
    default: 'true'
  heatcheck-version:
    description: |
      Release tag of nchantarotwong/heatcheck-action to download the binary from.
      Default: the action's own ref (e.g., "v1.0.0" when used as @v1.0.0).
      Override only if you need to pin to a specific binary independently of the
      action wrapper's version.
    required: false
    default: ''
  python-version:
    description: 'Python version on PATH (heatcheck calls CPython''s ast module).'
    required: false
    default: '3.11'
  upload-report:
    description: 'Upload .heatcheck/report.html as a workflow artifact. Must be "true" or "false". Default: "false".'
    required: false
    default: 'false'
  timeout-seconds:
    description: 'Per-run timeout for the heatcheck binary (seconds). Default: "600" (10 min).'
    required: false
    default: '600'

  upload-sarif:
    description: |
      Upload results to GitHub Code Scanning (the Security tab) as SARIF.
      Tolerant: if the job lacks `security-events: write`, or the run is a
      pull request from a fork, heatcheck warns and continues — it never
      fails the build. Must be "true" or "false". Default: "true".
    default: 'true'

  sarif-category:
    description: 'Code Scanning category (SARIF automationDetails.id) so heatcheck''s alerts coexist with other SAST tools instead of overwriting them. Default: "heatcheck".'
    default: 'heatcheck'

outputs:
  sarif-path:
    description: 'Path to the generated SARIF file on the runner (empty if upload-sarif is false or generation failed).'
    value: ${{ steps.sarif.outputs.path }}
  violations:
    description: 'Number of violations found across all scanned files. "0" on clean run; "-1" on internal failure (no JSON produced).'
    value: ${{ steps.run.outputs.violations }}
  json-path:
    description: 'Path to the raw JSON report on the runner filesystem.'
    value: ${{ steps.run.outputs.json }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      env:
        FAIL_ON_VIOLATIONS: ${{ inputs.fail-on-violations }}
        UPLOAD_REPORT: ${{ inputs.upload-report }}
        UPLOAD_SARIF: ${{ inputs.upload-sarif }}
        PATHS: ${{ inputs.paths }}
        TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      run: |
        set -euo pipefail
        case "${RUNNER_OS:-}" in
          Linux|macOS) ;;
          Windows) echo "::error::heatcheck-action does not support Windows runners. Use ubuntu-latest or macos-latest."; exit 1;;
          *) echo "::error::Unrecognized runner OS '${RUNNER_OS:-unset}'. Use ubuntu-latest or macos-latest."; exit 1;;
        esac
        if [ "${RUNNER_OS:-}" = "macOS" ] && [ "${RUNNER_ARCH:-}" = "X64" ]; then
          echo "::error::macOS x86_64 runners aren't supported (no prebuilt binary). Use macos-latest (arm64) or ubuntu-latest."
          exit 1
        fi
        bad=0
        case "$FAIL_ON_VIOLATIONS" in
          true|false) ;;
          *) echo "::error::fail-on-violations must be 'true' or 'false' (got: '$FAIL_ON_VIOLATIONS')"; bad=1;;
        esac
        case "$UPLOAD_REPORT" in
          true|false) ;;
          *) echo "::error::upload-report must be 'true' or 'false' (got: '$UPLOAD_REPORT')"; bad=1;;
        esac
        case "$UPLOAD_SARIF" in
          true|false) ;;
          *) echo "::error::upload-sarif must be 'true' or 'false' (got: '$UPLOAD_SARIF')"; bad=1;;
        esac
        if [ -z "$(echo "$PATHS" | tr -d '[:space:]')" ]; then
          echo "::error::paths is empty — provide at least one path to scan (default '.' scans the workspace)"
          bad=1
        fi
        if ! echo "$TIMEOUT_SECONDS" | grep -qE '^[0-9]+$'; then
          echo "::error::timeout-seconds must be a non-negative integer (got: '$TIMEOUT_SECONDS')"
          bad=1
        fi
        if [ -z "$(ls -A "$GITHUB_WORKSPACE" 2>/dev/null)" ]; then
          echo "::warning::workspace at \$GITHUB_WORKSPACE is empty — did you forget 'uses: actions/checkout@v6' before this step?"
        fi
        [ "$bad" = "0" ] || exit 1

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Resolve target asset + version
      id: resolve
      shell: bash
      env:
        VERSION_INPUT: ${{ inputs.heatcheck-version }}
        ACTION_REF: ${{ github.action_ref }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        # Determine which Release to pull the binary from.
        # Priority: explicit input → github.action_ref (set by @vX.Y.Z usage)
        # → fail with a clear error if neither yields a tagged version.
        ver="${VERSION_INPUT}"
        if [ -z "$ver" ]; then
          ver="${ACTION_REF}"
        fi
        if [ -z "$ver" ] || [ "$ver" = "main" ]; then
          echo "::error::No heatcheck-version resolved. Use 'uses: nchantarotwong/heatcheck-action@v1.0.0' (or @v1), or pass 'heatcheck-version: v1.0.0' explicitly. The 'main' branch has no published binary."
          exit 1
        fi
        # Floating major-version tag (e.g., @v1, @v2) — resolve to the
        # latest matching immutable vX.Y.Z release. Only X.Y.Z releases
        # ship binaries; floating tags exist as convenience pins for
        # marketplace consumers. Without resolution the download path
        # would 404. Skips drafts and prereleases (someone pinning @v1
        # wants stable, not v1.1.0-rc2).
        if echo "$ver" | grep -qE '^v[0-9]+$'; then
          major="${ver#v}"
          resolved=$(gh release list \
                       --repo nchantarotwong/heatcheck-action \
                       --limit 100 \
                       --json tagName,isDraft,isPrerelease \
                       --jq "[.[] | select(.isDraft == false) | select(.isPrerelease == false) | select(.tagName | test(\"^v${major}\\\\.[0-9]+\\\\.[0-9]+\$\"))] | .[0].tagName // empty")
          if [ -z "$resolved" ]; then
            echo "::error::Floating tag '$ver' has no matching v${major}.Y.Z release. Pin to a specific version like @v${major}.0.0 or check https://github.com/nchantarotwong/heatcheck-action/releases."
            exit 1
          fi
          echo "Resolved floating tag $ver → $resolved"
          ver="$resolved"
        fi
        # Determine asset name from runner OS + arch.
        os_part=""
        case "${RUNNER_OS:-}" in
          Linux) os_part="linux";;
          macOS) os_part="darwin";;
          *) echo "::error::unexpected RUNNER_OS '$RUNNER_OS'"; exit 1;;
        esac
        arch_part=""
        case "${RUNNER_ARCH:-}" in
          X64) arch_part="x86_64";;
          ARM64) arch_part="arm64";;
          *) echo "::error::unsupported RUNNER_ARCH '$RUNNER_ARCH'"; exit 1;;
        esac
        asset="heatcheck-${os_part}-${arch_part}"
        echo "version=$ver" >> "$GITHUB_OUTPUT"
        echo "asset=$asset" >> "$GITHUB_OUTPUT"
        echo "Will fetch $asset from heatcheck-action release $ver"

    - name: Cache heatcheck binary
      id: cache
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/heatcheck-bin
        # Cache by version + asset so a re-tag doesn't reuse a stale binary.
        key: heatcheck-${{ steps.resolve.outputs.version }}-${{ steps.resolve.outputs.asset }}-v1

    - name: Download heatcheck binary (cache miss)
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        VERSION: ${{ steps.resolve.outputs.version }}
        ASSET: ${{ steps.resolve.outputs.asset }}
        OUT_DIR: ${{ runner.temp }}/heatcheck-bin
        # github.token is automatically scoped to the consuming repo, but
        # heatcheck-action's Releases are PUBLIC so no auth is actually
        # needed. We pass it anyway to lift the unauthenticated rate limit
        # ceiling for high-volume orgs.
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        mkdir -p "$OUT_DIR"
        cd "$OUT_DIR"

        base="https://github.com/nchantarotwong/heatcheck-action/releases/download/${VERSION}"
        echo "Downloading from $base"

        for attempt in 1 2 3; do
          if curl --fail --silent --show-error --location \
                  --retry 3 --retry-delay 2 \
                  -o "$ASSET"        "$base/$ASSET" \
              && curl --fail --silent --show-error --location \
                  --retry 3 --retry-delay 2 \
                  -o "$ASSET.sha256" "$base/$ASSET.sha256"; then
            break
          fi
          if [ "$attempt" = "3" ]; then
            echo "::error::Failed to download $ASSET from heatcheck-action release $VERSION. Confirm the tag exists and assets are uploaded."
            exit 1
          fi
          sleep $((attempt * 2))
        done

        # Verify SHA256.
        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum -c "$ASSET.sha256"
        else
          # macOS: shasum -c needs the file in the same dir; already true.
          shasum -a 256 -c "$ASSET.sha256"
        fi

        chmod +x "$ASSET"
        ln -sf "$ASSET" heatcheck
        ./heatcheck --version

    - name: Run heatcheck
      id: run
      shell: bash
      env:
        HEATCHECK_BIN: ${{ runner.temp }}/heatcheck-bin/heatcheck
        HEATCHECK_JSON: ${{ runner.temp }}/heatcheck.json
        HEATCHECK_PATHS: ${{ inputs.paths }}
        HEATCHECK_FAIL: ${{ inputs.fail-on-violations }}
        HEATCHECK_UPLOAD: ${{ inputs.upload-report }}
        HEATCHECK_TIMEOUT: ${{ inputs.timeout-seconds }}
      run: |
        set -uo pipefail
        chmod +x "$HEATCHECK_BIN"
        echo "json=$HEATCHECK_JSON" >> "$GITHUB_OUTPUT"

        report_flag="--no-report"
        if [ "$HEATCHECK_UPLOAD" = "true" ]; then
          report_flag=""
        fi

        TIMEOUT_CMD=""
        if command -v timeout >/dev/null 2>&1; then
          TIMEOUT_CMD="timeout"
        elif command -v gtimeout >/dev/null 2>&1; then
          TIMEOUT_CMD="gtimeout"
        else
          echo "::warning::neither 'timeout' nor 'gtimeout' available; heatcheck runs without a per-scan timeout"
        fi

        set +e
        # shellcheck disable=SC2086
        if [ -n "$TIMEOUT_CMD" ]; then
          "$TIMEOUT_CMD" "$HEATCHECK_TIMEOUT"s "$HEATCHECK_BIN" --json $report_flag $HEATCHECK_PATHS > "$HEATCHECK_JSON"
        else
          "$HEATCHECK_BIN" --json $report_flag $HEATCHECK_PATHS > "$HEATCHECK_JSON"
        fi
        rc=$?
        set -e

        if [ "$rc" = "124" ]; then
          echo "::error::heatcheck exceeded the ${HEATCHECK_TIMEOUT}s timeout. Bump 'timeout-seconds' or narrow 'paths'."
          echo "violations=-1" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        if [ "$rc" = "2" ] || [ "$rc" = "64" ]; then
          echo "::error::heatcheck exited with rc=$rc"
          [ -s "$HEATCHECK_JSON" ] && head -c 4000 "$HEATCHECK_JSON" || true
          echo "violations=-1" >> "$GITHUB_OUTPUT"
          exit "$rc"
        fi

        if ! python "${{ github.action_path }}/scripts/post_process.py" \
              --json "$HEATCHECK_JSON" \
              --workspace "$GITHUB_WORKSPACE" \
              --summary "${GITHUB_STEP_SUMMARY:-/dev/null}"; then
          echo "::error::post_process.py failed — JSON may be malformed."
          echo "violations=-1" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        n=$(python -c '
        import json, os
        try:
            with open(os.environ["HEATCHECK_JSON"]) as f:
                print(len(json.load(f).get("violations", [])))
        except Exception:
            print("-1")
        ' 2>/dev/null || echo "-1")
        echo "violations=$n" >> "$GITHUB_OUTPUT"

        if [ "$n" != "0" ] && [ "$n" != "-1" ] && [ "$HEATCHECK_FAIL" = "true" ]; then
          exit 1
        fi
        exit 0

    - name: Code Scanning (SARIF)
      id: sarif
      if: ${{ always() && inputs.upload-sarif == 'true' }}
      shell: bash
      env:
        HEATCHECK_BIN: ${{ runner.temp }}/heatcheck-bin/heatcheck
        HEATCHECK_SARIF: ${{ runner.temp }}/heatcheck.sarif
        HEATCHECK_PATHS: ${{ inputs.paths }}
        HEATCHECK_TIMEOUT: ${{ inputs.timeout-seconds }}
        SARIF_CATEGORY: ${{ inputs.sarif-category }}
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
        SHA: ${{ github.sha }}
        REF: ${{ github.ref }}
        EVENT_NAME: ${{ github.event_name }}
        IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
      run: |
        set -uo pipefail
        warn(){ echo "::warning::heatcheck Code Scanning: $1"; printf '⚠️ heatcheck — Code Scanning upload skipped: %s\n' "$1" >> "${GITHUB_STEP_SUMMARY:-/dev/null}"; }

        # Generate SARIF (separate output mode; timeout-guarded). heatcheck is
        # fast, so this second pass is cheap.
        TIMEOUT_CMD=""
        command -v timeout >/dev/null 2>&1 && TIMEOUT_CMD=timeout
        if [ -z "$TIMEOUT_CMD" ] && command -v gtimeout >/dev/null 2>&1; then TIMEOUT_CMD=gtimeout; fi
        set +e
        # shellcheck disable=SC2086
        if [ -n "$TIMEOUT_CMD" ]; then
          "$TIMEOUT_CMD" "${HEATCHECK_TIMEOUT}"s "$HEATCHECK_BIN" --sarif --no-report $HEATCHECK_PATHS > "$HEATCHECK_SARIF"
        else
          "$HEATCHECK_BIN" --sarif --no-report $HEATCHECK_PATHS > "$HEATCHECK_SARIF"
        fi
        gen_rc=$?
        set -e
        # heatcheck exit codes: 0=clean, 1=violations found (the main case to
        # surface!), 3=nothing conclusively analyzed — all three still produce a
        # valid SARIF report. Only 2/64 (internal error) or 124 (timeout), or an
        # empty file, are real generation failures.
        if [ "$gen_rc" = "2" ] || [ "$gen_rc" = "64" ] || [ "$gen_rc" = "124" ] || [ ! -s "$HEATCHECK_SARIF" ]; then
          warn "SARIF generation failed (rc=$gen_rc)."
          echo "path=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "path=$HEATCHECK_SARIF" >> "$GITHUB_OUTPUT"

        # Fork PRs can't write security-events (GitHub restriction) — skip,
        # don't fail. The PR still gets inline annotations from the run step.
        if [ "${EVENT_NAME:-}" = "pull_request" ] && [ "${IS_FORK:-}" = "true" ]; then
          warn "pull request from a fork — GitHub blocks Code Scanning upload from forks."
          exit 0
        fi

        # Build the upload request body with Python — already required by
        # heatcheck (it shells out to CPython's ast module), so no jq
        # dependency, guaranteed present, and correct JSON escaping. The script
        # injects the Code Scanning category, gzip+base64-encodes the SARIF, and
        # writes the body via files (no ARG_MAX limit on large reports).
        # Tolerant: any failure warns and skips the upload — never fails build.
        tmp="${RUNNER_TEMP:-/tmp}"
        body="$tmp/heatcheck.sarif.body.json"
        set +e
        python "${{ github.action_path }}/scripts/sarif_body.py" \
          --sarif "$HEATCHECK_SARIF" --out "$body" \
          --commit-sha "$SHA" --ref "$REF" --category "${SARIF_CATEGORY:-}" \
          2> "$tmp/sarif_body_err"
        build_rc=$?
        set -e
        if [ "$build_rc" != "0" ] || [ ! -s "$body" ]; then
          warn "could not build the SARIF upload body ($(head -c 200 "$tmp/sarif_body_err" 2>/dev/null | tr '\n' ' '))."
          exit 0
        fi

        # Upload via the REST API, tolerantly: a missing 'security-events:
        # write' permission (or any API error) WARNS and continues — it never
        # breaks the build.
        set +e
        gh api --method POST "/repos/${GH_REPO}/code-scanning/sarifs" \
          --input "$body" \
          > /dev/null 2> "$tmp/sarif_upload_err"
        up_rc=$?
        set -e
        if [ "$up_rc" != "0" ]; then
          warn "$(head -c 240 "$tmp/sarif_upload_err" 2>/dev/null | tr '\n' ' '). Grant 'permissions: security-events: write' to populate the Security tab."
          exit 0
        fi
        printf '✅ heatcheck — uploaded SARIF to Code Scanning (Security tab).\n' >> "${GITHUB_STEP_SUMMARY:-/dev/null}"

    - name: Upload HTML report
      if: ${{ always() && inputs.upload-report == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: heatcheck-report
        path: .heatcheck/report.html
        if-no-files-found: warn
