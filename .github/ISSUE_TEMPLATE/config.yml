# Force users through the bug or feature template — no blank-issue
# escape hatch. GitHub auto-injects a "Report a security vulnerability"
# link on the new-issue chooser when Private Vulnerability Reporting
# is enabled in repo settings, so we don't need a custom contact_link
# for that. The email fallback lives in SECURITY.md for reporters who
# can't or don't want to use the GitHub form.
blank_issues_enabled: false
