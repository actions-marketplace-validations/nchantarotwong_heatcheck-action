# One-shot debug helper for Heat issue #839: heat_runtime_shutdown
# atexit crash on Linux x86_64. Builds heatc on a native x86_64 GH
# runner, then runs it under gdb to capture a backtrace + register
# state at the crash site. Uploads the backtrace as a job artifact.
#
# Delete this workflow after the underlying bug is fixed.

name: debug-atexit-x86_64

on:
  workflow_dispatch:
    inputs:
      heat-ref:
        description: 'Heat ref to debug.'
        required: false
        default: 'main'

env:
  HEAT_REPO: nchantarotwong/Heat

jobs:
  bt:
    runs-on: ubuntu-22.04
    steps:
      - name: Install deps + gdb + valgrind
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang gdb valgrind \
            libcurl4-openssl-dev libsqlite3-dev libxml2-dev zlib1g-dev

      - name: Clone Heat
        env:
          HEAT_PAT: ${{ secrets.HEAT_PAT }}
        run: |
          set -euo pipefail
          git clone --depth 1 \
            "https://x-access-token:${HEAT_PAT}@github.com/${HEAT_REPO}.git" Heat
          cd Heat
          if [ "${{ inputs.heat-ref }}" != "main" ]; then
            git fetch --depth 1 origin "${{ inputs.heat-ref }}" 2>/dev/null \
              || git fetch origin
            git checkout --quiet "${{ inputs.heat-ref }}"
          fi
          echo "Heat HEAD: $(git rev-parse HEAD)"

      - name: Build heatc with debug info
        run: |
          set -euo pipefail
          cd Heat
          bash bootstrap/scripts/bootstrap_heatc.sh
          # Rebuild the runtime .o files with -g -O0 for clean backtraces.
          # bootstrap_heatc.sh already ran build_runtime.sh, but in -O2.
          # Override CFLAGS via env var if the script honors it; otherwise
          # we'll patch in a manual rebuild loop.
          if grep -q 'CFLAGS' bootstrap/scripts/build_runtime.sh; then
            CFLAGS="-O0 -g" bash bootstrap/scripts/build_runtime.sh
          else
            # Build manually with debug flags
            cd bootstrap/runtime
            for src in *.c; do
              [ "$src" = "test_chain_compat.c" ] && continue
              [ -f "$src" ] && clang -O0 -g -c "$src" -o "${src%.c}.o" \
                -I. -I/usr/include 2>&1 | grep -vE "warning|note:" | tail -3 || true
            done
            cd ../..
          fi
          # Rebuild heatc binary with the new debug .o files
          bash bootstrap/scripts/heatc_rebuild.sh || true
          ls -la /tmp/heatc

      - name: Capture gdb backtrace + outer-list dump at crash
        run: |
          set -euo pipefail
          cd Heat
          cat > /tmp/gdb_commands.txt <<'GDB'
          set pagination off
          set confirm off
          set print pretty on
          # Don't abort the script on memory-read errors — keep going so
          # later commands still execute.
          set unwindonsignal on
          handle SIGSEGV stop print
          run bootstrap/heatc/heatc.heat -o /tmp/heatc_out --emit-ll
          echo \n=== FAULT BACKTRACE ===\n
          bt 50
          echo \n=== REGISTERS ===\n
          info registers

          # --- OUTER FRAME FIRST (the actionable data) ---
          echo \n=== OUTER HEAT_LIST_RELEASE FRAME (frame 3 — heap list being walked) ===\n
          frame 3
          info args
          info locals
          echo \n--- outer list struct (full) ---\n
          print *list
          echo \n--- outer list elem_type (1=Str 2=List 4=Dict 5=IDict 7=Tagged 8=Struct) ---\n
          print list->elem_type
          echo \n--- outer list length ---\n
          print list->length
          echo \n--- outer list capacity ---\n
          print list->capacity
          echo \n--- which loop index `i` is being walked ---\n
          print i
          echo \n--- first 24 elements ---\n
          python
          import gdb
          try:
              lst = gdb.parse_and_eval("list")
              n = int(lst["length"])
              data = lst["data"]
              # Print first min(n, 24) elements.
              k = min(n, 24)
              for j in range(k):
                  v = int(data[j])
                  cls = "heap" if 0x400000 <= v < 0x700000000000 else (
                        "stack/hi" if 0x700000000000 <= v < 0x800000000000 else
                        "lowjunk" if v < 0x1000 else "other")
                  print(f"  data[{j}] = 0x{v:016x}  [{cls}]")
              if n > 24:
                  print(f"  ... ({n - 24} more)")
              # Highlight any pointer in the suspect 0x7fff... range
              flagged = [j for j in range(n) if 0x700000000000 <= int(data[j]) < 0x800000000000]
              print(f"  flagged-suspect-indices = {flagged}")
          except Exception as e:
              print(f"python introspection failed: {e}")
          end

          # --- INNER FRAME (the unmapped pointer) ---
          echo \n=== INNER HEAT_LIST_RELEASE FRAME (#0 — bad pointer) ===\n
          frame 0
          info args
          echo \n--- raw bytes at inner ptr via x/gx (non-fatal) ---\n
          x/4gx $rdi

          echo \n=== /proc/self/maps around the bad page ===\n
          shell cat /proc/$(pgrep -f /tmp/heatc | head -1)/maps 2>/dev/null | grep -E '^7fff[ce]' | head -20 || true

          echo \n=== ALL THREADS BT ===\n
          thread apply all bt 10
          quit
          GDB
          gdb -q -batch -x /tmp/gdb_commands.txt /tmp/heatc 2>&1 | tee /tmp/atexit-bt.log
          echo --- summary ---
          grep -E '#[0-9]+|SIGSEGV|Program received|elem_type|length|data\[|inner addr' /tmp/atexit-bt.log | head -80

      - name: Run under valgrind to find dangling-alloc site
        run: |
          set -euo pipefail
          cd Heat
          # valgrind/memcheck tracks every alloc + free with a backtrace.
          # For the invalid-read at the dangling pointer, it prints both:
          #   - Address X is N bytes inside a block alloc'd at: [bt]
          #   - Block was free'd at: [bt]
          # The free bt is the answer to "which heat code released this
          # string while the list still held it".
          #
          # --track-origins=yes adds origin tracking for uninit reads.
          # --num-callers=30 deepens the backtrace so we see through any
          # heat-runtime trampolines into the emitted code.
          # Timeout generously — valgrind is ~20x slower than native.
          timeout 600s valgrind \
            --error-exitcode=0 \
            --num-callers=30 \
            --track-origins=yes \
            --read-inline-info=yes \
            --log-file=/tmp/valgrind.log \
            /tmp/heatc bootstrap/heatc/heatc.heat -o /tmp/heatc_out2 --emit-ll \
            2>&1 | tail -40 || true
          echo --- valgrind summary ---
          grep -E 'Invalid|Address|alloc.d at|free.d at|Process terminating|by 0x|at 0x' /tmp/valgrind.log | head -120 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atexit-backtrace
          path: |
            /tmp/atexit-bt.log
            /tmp/valgrind.log
          retention-days: 14
